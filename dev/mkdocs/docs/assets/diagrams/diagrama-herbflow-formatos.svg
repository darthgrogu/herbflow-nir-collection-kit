<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="O mesmo fluxo herbflow em tres formatos (planilha e parser hoje; app mobile e aplicacao desktop em breve) converge para um artefato de protocolo (iHerbSpec ou outro), compartilhado entre cientistas e herbarios.">
  <style>
    text { font-family: -apple-system, "Segoe UI", Arial, sans-serif; }
    .title    { fill: #26332c; font-weight: 700; }
    .muted    { fill: #6d7a72; }
    .caption  { fill: #6d7a72; font-style: italic; }

    .card-solid   { fill: #2f5233; }
    .t-solid      { fill: #ffffff; }
    .t-solid-sub  { fill: #cfe0d6; }

    .card-ghost   { fill: #2f5233; fill-opacity: 0.10; stroke: #2f5233; stroke-opacity: 0.45; stroke-width: 1.5; stroke-dasharray: 6 5; }
    .t-ghost      { fill: #2f5233; fill-opacity: 0.85; }

    .tag-now    { fill: #bfe3cc; }
    .t-tag-now  { fill: #1f3a22; font-weight: 700; }
    .tag-soon   { fill: #2f5233; fill-opacity: 0.14; }
    .t-tag-soon { fill: #2f5233; fill-opacity: 0.80; font-weight: 700; }

    .center-box { fill: #2f5233; fill-opacity: 0.06; stroke: #2f5233; stroke-opacity: 0.30; stroke-width: 1.5; }
    .chip-solid { fill: #2f5233; }
    .chip-ghost { fill: #2f5233; fill-opacity: 0.10; stroke: #2f5233; stroke-opacity: 0.45; stroke-width: 1.5; stroke-dasharray: 5 4; }

    .share-box  { fill: #1f6f78; fill-opacity: 0.08; stroke: #1f6f78; stroke-opacity: 0.32; stroke-width: 1.5; }
    .chip-share { fill: #1f6f78; }

    .arrow      { stroke: #8a978f; stroke-width: 2.2; fill: none; }
    .arrowhead  { fill: #8a978f; }

    @media (prefers-color-scheme: dark) {
      .title   { fill: #d6e5db; }
      .muted   { fill: #9fb0a6; }
      .caption { fill: #9fb0a6; }
      .card-ghost { fill: #74c69d; fill-opacity: 0.14; stroke: #74c69d; stroke-opacity: 0.55; }
      .t-ghost { fill: #a9d9bf; fill-opacity: 0.95; }
      .tag-soon   { fill: #74c69d; fill-opacity: 0.18; }
      .t-tag-soon { fill: #a9d9bf; }
      .center-box { fill: #74c69d; fill-opacity: 0.08; stroke: #74c69d; stroke-opacity: 0.35; }
      .chip-ghost { fill: #74c69d; fill-opacity: 0.12; stroke: #74c69d; stroke-opacity: 0.5; }
      .share-box  { fill: #4cc9d6; fill-opacity: 0.10; stroke: #4cc9d6; stroke-opacity: 0.35; }
      .chip-share { fill: #2b8f99; }
      .arrow     { stroke: #9fb0a6; }
      .arrowhead { fill: #9fb0a6; }
    }
  </style>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path class="arrowhead" d="M0 0 L10 5 L0 10 z"/>
    </marker>
  </defs>

  <!-- ============ COLUNA 1: os 3 formatos do mesmo fluxo ============ -->

  <!-- Formato 1: hoje (solido) -->
  <rect class="card-solid" x="20" y="20" width="215" height="88" rx="14"/>
  <rect class="tag-now" x="170" y="32" width="52" height="20" rx="10"/>
  <text class="t-tag-now" x="196" y="46" font-size="10" text-anchor="middle">hoje</text>
  <text class="t-solid" x="36" y="72" font-size="15" font-weight="700">Planilha + Parser</text>
  <text class="t-solid-sub" x="36" y="92" font-size="11">este pacote de teste</text>

  <!-- Formato 2: em breve (transparente) -->
  <rect class="card-ghost" x="20" y="146" width="215" height="88" rx="14"/>
  <rect class="tag-soon" x="158" y="158" width="64" height="20" rx="10"/>
  <text class="t-tag-soon" x="190" y="172" font-size="10" text-anchor="middle">em breve</text>
  <text class="t-ghost" x="36" y="198" font-size="15" font-weight="700">App mobile</text>
  <text class="t-ghost" x="36" y="218" font-size="11">coleta em campo</text>

  <!-- Formato 3: em breve (transparente) -->
  <rect class="card-ghost" x="20" y="272" width="215" height="88" rx="14"/>
  <rect class="tag-soon" x="158" y="284" width="64" height="20" rx="10"/>
  <text class="t-tag-soon" x="190" y="298" font-size="10" text-anchor="middle">em breve</text>
  <text class="t-ghost" x="36" y="324" font-size="15" font-weight="700">Aplicação desktop</text>
  <text class="t-ghost" x="36" y="344" font-size="11">integrada ao InnoSpectra</text>

  <!-- ============ setas convergindo para o artefato ============ -->
  <path class="arrow" marker-end="url(#ah)" d="M235 64 C300 64 300 175 352 188"/>
  <path class="arrow" marker-end="url(#ah)" d="M235 190 C300 190 305 190 352 190"/>
  <path class="arrow" marker-end="url(#ah)" d="M235 316 C300 316 300 205 352 192"/>

  <!-- ============ COLUNA 2: artefato de protocolo ============ -->
  <rect class="center-box" x="360" y="108" width="190" height="150" rx="14"/>
  <text class="title" x="455" y="136" font-size="13" text-anchor="middle">Artefato de protocolo</text>
  <text class="muted" x="455" y="153" font-size="10" text-anchor="middle">padronizado e compartilhável</text>

  <rect class="chip-solid" x="380" y="168" width="150" height="30" rx="8"/>
  <text class="t-solid" x="455" y="188" font-size="13" text-anchor="middle"><tspan font-weight="700">iHerbSpec</tspan> <tspan font-size="11">v1.2.1</tspan></text>

  <rect class="chip-ghost" x="380" y="208" width="150" height="30" rx="8"/>
  <text class="t-ghost" x="455" y="228" font-size="12" text-anchor="middle">outro protocolo</text>

  <!-- ============ seta para o compartilhamento ============ -->
  <path class="arrow" marker-end="url(#ah)" d="M550 190 L598 190"/>

  <!-- ============ COLUNA 3: compartilhado ============ -->
  <rect class="share-box" x="606" y="120" width="194" height="140" rx="14"/>
  <text class="title" x="703" y="150" font-size="12" text-anchor="middle">Compartilhado entre</text>

  <rect class="chip-share" x="628" y="166" width="150" height="30" rx="8"/>
  <!-- ícone: pessoa (cientista) -->
  <circle fill="#ffffff" cx="654" cy="176" r="4"/>
  <path fill="#ffffff" d="M646 190 C646 183 662 183 662 190 Z"/>
  <text class="t-solid" x="718" y="186" font-size="13" text-anchor="middle">cientistas</text>

  <rect class="chip-share" x="628" y="206" width="150" height="30" rx="8"/>
  <!-- ícone: instituição (herbário) -->
  <polygon fill="#ffffff" points="643,216 667,216 655,208"/>
  <rect fill="#ffffff" x="646" y="217" width="2.4" height="12"/>
  <rect fill="#ffffff" x="653.8" y="217" width="2.4" height="12"/>
  <rect fill="#ffffff" x="661.6" y="217" width="2.4" height="12"/>
  <rect fill="#ffffff" x="643" y="230" width="24" height="2.6"/>
  <text class="t-solid" x="718" y="226" font-size="13" text-anchor="middle">herbários</text>

  <!-- ============ legenda ============ -->
  <text class="caption" x="410" y="374" font-size="12" text-anchor="middle">herbflow — o mesmo fluxo, vários formatos, um só artefato compartilhável</text>
</svg>
