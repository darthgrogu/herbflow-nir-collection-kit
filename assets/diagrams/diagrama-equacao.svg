<svg viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Planilha mais leituras do equipamento, mais o parser com o protocolo iHerbSpec, igual a artefato de saida">
  <style>
    .box { fill: #f8fafb; stroke: #6b9bc3; stroke-width: 2; }
    .label { font-family: -apple-system, Segoe UI, Arial, sans-serif; font-size: 14px; fill: #222; text-anchor: middle; }
    .label-sm { font-family: -apple-system, Segoe UI, Arial, sans-serif; font-size: 11px; fill: #555; text-anchor: middle; }
    .op { font-family: -apple-system, Segoe UI, Arial, sans-serif; font-size: 26px; fill: #6b9bc3; text-anchor: middle; font-weight: bold; }
  </style>

  <rect class="box" x="10" y="35" width="190" height="80" rx="10"/>
  <text class="label" x="105" y="68">Planilha</text>
  <text class="label" x="105" y="88">+ leituras do</text>
  <text class="label" x="105" y="105">equipamento</text>

  <text class="op" x="230" y="85">+</text>

  <rect class="box" x="270" y="35" width="220" height="80" rx="10"/>
  <text class="label" x="380" y="68">Gerador de</text>
  <text class="label" x="380" y="88">artefato (.exe)</text>
  <text class="label-sm" x="380" y="105">protocolo iHerbSpec</text>

  <text class="op" x="520" y="85">=</text>

  <rect class="box" x="560" y="35" width="330" height="80" rx="10"/>
  <text class="label" x="725" y="68">Artefato de saída</text>
  <text class="label-sm" x="725" y="88">dados brutos preservados +</text>
  <text class="label-sm" x="725" y="103">dados limpos, prontos para análise</text>
</svg>
